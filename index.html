    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const images = document.querySelectorAll('.gallery-container img');
            const lightbox = document.getElementById('myLightbox');
            const lightboxImage = document.getElementById('lightboxImage');
            const imageDescription = document.getElementById('imageDescription'); // Get the description element
        
            images.forEach(image => {
                image.addEventListener('click', function() {
                    lightbox.style.display = 'flex'; // Show the lightbox
                    lightboxImage.src = this.src; // Set the src for the lightbox image to the clicked image's src
                    imageDescription.textContent = this.alt; // Set the description text to the image's alt text
                });
            });
        
            lightbox.addEventListener('click', function() {
                lightbox.style.display = 'none'; // Hide the lightbox on click
            });
        });
        </script>
        
        <div id="myLightbox" class="lightbox">
            <img src="#" id="lightboxImage">
            <p id="imageDescription" style="color: white; text-align: center;">Description goes here</p> <!-- New element for description -->
